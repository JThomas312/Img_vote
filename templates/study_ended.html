{% extends "base.html" %}

{% block title %}Study Paused or Ended — Img Vote{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-24 text-center">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-slate-600 to-slate-700 px-8 py-6">
      <p class="text-4xl mb-2">⏸</p>
      <h1 class="text-xl font-bold text-white">Hello, {{ username }}!</h1>
    </div>
    <div class="px-8 py-7">
      <p class="text-slate-600 text-sm mb-7">The study is currently paused or has already ended.</p>
      <a href="/logout/" class="inline-block bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-semibold shadow-md hover:shadow-lg transition-all">Logout</a>
    </div>
  </div>
</div>
{% endblock %}
