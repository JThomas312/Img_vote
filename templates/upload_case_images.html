{% extends "base.html" %}

{% block title %}Upload Case Images — Img Vote{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-md p-8 max-w-lg mx-auto mt-10">
  <h1 class="text-xl font-semibold text-gray-800 mb-6">Upload Case Image Files</h1>
  {% if errors %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-danger">{{ errors }}</div>
  {% endif %}
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label class="block border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-primary transition-colors mb-4">
      <span class="text-sm text-gray-500">Click to select a ZIP file</span>
      <input type="file" name="file" class="hidden">
    </label>
    <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-blue-900 mt-4 text-sm">Upload</button>
  </form>
  <div class="mt-6">
    <a href="/manage_uploads/" class="border border-gray-400 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 text-sm">Go Back</a>
  </div>
</div>
{% endblock %}
