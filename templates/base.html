<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Img Vote{% endblock %}</title>

  <script src="{{url_for('static', filename='node_modules/tailwind/tailwind.js')}}"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:  { DEFAULT: '#4f46e5', light: '#c7d2fe', dark: '#3730a3' },
            teal:     { DEFAULT: '#0891b2', dark: '#0e7490' },
            navy:     '#1e3a5f',
            success:  '#16a34a',
            danger:   '#dc2626',
            surface:  { DEFAULT: '#eef2ff', dark: '#e0e7ff' },
            header:   '#6366f1',
          }
        }
      }
    }
  </script>

  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 min-h-screen pt-16{% endblock %}">

  {% block nav %}
  <nav class="fixed top-0 left-0 w-full h-16 bg-gradient-to-r from-indigo-700 to-blue-700 text-white flex items-center justify-between px-6 z-50 shadow-lg">
    <span class="text-xl font-extrabold tracking-tight">Img<span class="text-indigo-200">Vote</span></span>
    <div class="flex items-center gap-4 text-sm">
      {% if session.get('admin') %}
        <span class="bg-indigo-500 bg-opacity-50 text-indigo-100 text-xs font-semibold px-2.5 py-0.5 rounded-full">Admin</span>
      {% endif %}
      {% if session.get('username') %}
        <span class="text-indigo-200">{{ session['username'] }}</span>
        <a href="/logout/" class="bg-white bg-opacity-15 hover:bg-opacity-25 transition-all px-3 py-1 rounded-lg text-white text-xs font-medium">Logout</a>
      {% endif %}
    </div>
  </nav>
  {% endblock %}

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
