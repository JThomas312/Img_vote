<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Img Vote{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:  { DEFAULT: '#0d47a1', light: '#90caf9', dark: '#08306b' },
            teal:     { DEFAULT: '#00aabb', dark: '#008899' },
            navy:     '#075f9c',
            success:  '#37de37',
            danger:   '#ff0000',
            surface:  { DEFAULT: '#f7f7f7', dark: '#eeeeee' },
            header:   '#bbbbbb',
          }
        }
      }
    }
  </script>

  <style>
    /* Range slider — Tailwind has no equivalent for WebKit/Mozilla pseudo-elements */
    .slidecontainer { width: 100%; }
    .slider {
      -webkit-appearance: none;
      width: 100%;
      height: 15px;
      background: linear-gradient(to left, green, yellow 50%, red) content-box;
      opacity: 0.7;
      -webkit-transition: .2s;
      transition: opacity .2s;
    }
    .slider:hover { opacity: 1; }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25px;
      height: 25px;
      background: #04AA6D;
      cursor: pointer;
    }
    .slider::-moz-range-thumb {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: #04AA6D;
      cursor: pointer;
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-surface min-h-screen pt-14{% endblock %}">

  {% block nav %}
  <!-- Global navigation bar -->
  <nav class="fixed top-0 left-0 w-full h-14 bg-primary text-white flex items-center justify-between px-6 z-50 shadow">
    <span class="text-xl font-bold">Img Vote</span>
    <div class="flex items-center gap-4 text-sm">
      {% if session.get('admin') %}
        <span class="opacity-80">Admin</span>
      {% endif %}
      {% if session.get('username') %}
        <span class="opacity-80">{{ session['username'] }}</span>
        <a href="/logout/" class="underline hover:opacity-100">Logout</a>
      {% endif %}
    </div>
  </nav>
  {% endblock %}

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
