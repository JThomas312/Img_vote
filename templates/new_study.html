{% extends "base.html" %}

{% block title %}New Study{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-5">
      <h1 class="text-xl font-bold text-white">New Study</h1>
      <p class="text-indigo-200 text-xs mt-0.5">You are adding a new study</p>
    </div>
    <div class="px-8 py-7">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="mb-5">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" for="study_name">Study Name</label>
            {% if error %}
              <p class="text-xs text-danger mb-1">{{ error }}</p>
            {% endif %}
            <input id="study_name" class="w-full border {% if nameError %}border-red-300{% else %}border-slate-200{% endif %} rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50" type="text" name="study_name">
          </div>
          <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white py-2.5 rounded-lg font-semibold text-sm shadow-md hover:shadow-lg transition-all">Create Study</button>
            <a href="/user_home/" class="border border-slate-300 text-slate-600 px-4 py-2.5 rounded-lg hover:bg-slate-50 text-sm font-medium transition-colors">Cancel</a>
          </div>
        </form>
    </div>
  </div>
</div>
{% endblock %}
