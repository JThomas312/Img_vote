{% extends "base.html" %}

{% block title %}Upload Tutorial Images{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-10">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-5">
      <h1 class="text-xl font-bold text-white">Upload Tutorial Image Files</h1>
      <p class="text-indigo-200 text-xs mt-0.5">ZIP archive containing all tutorial images</p>
    </div>
    <div class="px-8 py-7">
      <form method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <label class="block border-2 border-dashed border-indigo-200 rounded-xl p-10 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-all mb-5">
          <p class="text-3xl mb-2">📋</p>
          <p class="text-sm font-medium text-slate-600">Click to select a ZIP file</p>
          <p class="text-xs text-slate-400 mt-1">Drag & drop also works</p>
          <input type="file" name="file" id="fileInput" accept=".zip" class="hidden">
          <p id="file-name" class="hidden mt-3 text-xs font-medium text-indigo-700 bg-indigo-100 border border-indigo-200 rounded-full px-3 py-1 inline-block truncate max-w-full"></p>
        </label>
        <div class="flex gap-3">
          <button type="submit" class="flex-1 bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white py-2.5 rounded-lg font-semibold text-sm shadow-md hover:shadow-lg transition-all">Upload</button>
          <a href="/manage_uploads/" class="border border-slate-300 text-slate-600 px-4 py-2.5 rounded-lg hover:bg-slate-50 text-sm font-medium transition-colors">Go Back</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='JS/file_upload_dropzone.js') }}"></script>
{% endblock %}
