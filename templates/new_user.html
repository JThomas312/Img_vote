{% extends "base.html" %}

{% block title %}Create New User{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-10">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-5">
      <h1 class="text-xl font-bold text-white">Create New User</h1>
      <p class="text-indigo-200 text-xs mt-0.5">Add a reviewer or administrator</p>
    </div>
    <div class="px-8 py-7">
      {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-danger">{{ error }}</div>
        <a href="/user_home/" class="inline-block border border-slate-300 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-50 text-sm">Go back</a>
      {% else %}
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" for="login">Login</label>
            <input id="login" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50" type="text" name="login">
          </div>
          <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" for="fullname">Full Name</label>
            <input id="fullname" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50" type="text" name="fullname">
          </div>
          <fieldset class="mb-4 border border-slate-200 rounded-xl p-4 bg-slate-50">
            <legend class="text-xs font-semibold text-slate-500 uppercase tracking-wide px-1">Administrator</legend>
            <div class="flex gap-6 text-sm mt-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" id="admin_yes" name="admin" value="1" class="accent-indigo-600"> Yes
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" id="admin_no" name="admin" value="0" checked class="accent-indigo-600"> No
              </label>
            </div>
          </fieldset>
          <fieldset id="full_review_field" class="mb-6 border border-slate-200 rounded-xl p-4 bg-slate-50">
            <legend class="text-xs font-semibold text-slate-500 uppercase tracking-wide px-1">Full review</legend>
            <div class="flex gap-6 text-sm mt-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" id="full_review_yes" name="full_review" value="1" class="accent-indigo-600"> Yes
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" id="full_review_no" name="full_review" value="0" checked class="accent-indigo-600"> No
              </label>
            </div>
          </fieldset>
          <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white py-2.5 rounded-lg font-semibold text-sm shadow-md hover:shadow-lg transition-all">Create User</button>
            <a href="/user_home/" class="border border-slate-300 text-slate-600 px-4 py-2.5 rounded-lg hover:bg-slate-50 text-sm font-medium transition-colors">Cancel</a>
          </div>
        </form>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
