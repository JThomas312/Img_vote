{% extends "base.html" %}

{% block title %}Create New User — Img Vote{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-md p-10 w-full max-w-sm mx-auto mt-10">
  <h1 class="text-2xl font-bold text-primary mb-8 text-center">Create New User</h1>

  {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-danger">{{ error }}</div>
    <a href="/user_home/" class="inline-block border border-gray-400 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 text-sm">Go back</a>
  {% else %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="login">Login</label>
        <input id="login" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" type="text" name="login">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="fullname">Full Name</label>
        <input id="fullname" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" type="text" name="fullname">
      </div>
      <fieldset class="mb-4 border border-gray-200 rounded-lg p-3">
        <legend class="text-sm font-semibold text-gray-700 px-1">Administrator</legend>
        <div class="flex gap-4 text-sm mt-1">
          <label class="flex items-center gap-1">
            <input type="radio" id="admin_yes" name="admin" value="1"> Yes
          </label>
          <label class="flex items-center gap-1">
            <input type="radio" id="admin_no" name="admin" value="0" checked> No
          </label>
        </div>
      </fieldset>
      <fieldset id="full_review_field" class="mb-6 border border-gray-200 rounded-lg p-3">
        <legend class="text-sm font-semibold text-gray-700 px-1">Full review</legend>
        <div class="flex gap-4 text-sm mt-1">
          <label class="flex items-center gap-1">
            <input type="radio" id="full_review_yes" name="full_review" value="1"> Yes
          </label>
          <label class="flex items-center gap-1">
            <input type="radio" id="full_review_no" name="full_review" value="0" checked> No
          </label>
        </div>
      </fieldset>
      <div class="flex gap-3">
        <button type="submit" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary-dark text-sm font-medium">Create User</button>
        <a href="/user_home/" class="border border-gray-400 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 text-sm">Cancel</a>
      </div>
    </form>
  {% endif %}
</div>
{% endblock %}
