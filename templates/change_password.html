{% extends "base.html" %}

{% block title %}Change Password — Img Vote{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-md p-10 w-full max-w-sm mx-auto mt-20">
  <h1 class="text-2xl font-bold text-primary mb-8 text-center">Change Password</h1>
  {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-danger">{{ error }}</div>
  {% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1" for="oldPass">Current Password</label>
      <input id="oldPass" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" type="password" name="oldPass">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1" for="newPass">New Password</label>
      <input id="newPass" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" type="password" name="newPass">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1" for="confirmPass">Confirm New Password</label>
      <input id="confirmPass" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" type="password" name="confirmPass">
    </div>
    <button type="submit" class="w-full mt-6 bg-primary text-white py-2 rounded-lg hover:bg-primary-dark font-medium">Change Password</button>
  </form>
</div>
{% endblock %}
