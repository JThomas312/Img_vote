{% extends "base.html" %}

{% block title %}Change Password — Img Vote{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-5">
      <h1 class="text-xl font-bold text-white">Change Password</h1>
      <p class="text-indigo-200 text-xs mt-0.5">Update your account credentials</p>
    </div>
    <div class="px-8 py-7">
      {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-danger">{{ error }}</div>
      {% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" for="oldPass">Current Password</label>
          <input id="oldPass" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50" type="password" name="oldPass">
        </div>
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" for="newPass">New Password</label>
          <input id="newPass" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50" type="password" name="newPass">
        </div>
        <div class="mb-6">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" for="confirmPass">Confirm New Password</label>
          <input id="confirmPass" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50" type="password" name="confirmPass">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white py-2.5 rounded-lg font-semibold text-sm shadow-md hover:shadow-lg transition-all">Change Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
