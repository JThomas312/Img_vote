{% extends "base.html" %}

{% block title %}Confirm User Deletion — Img Vote{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-md p-8 max-w-md mx-auto mt-20">
  <h1 class="text-xl font-bold text-danger mb-4">Delete User</h1>
  <p class="text-gray-700 text-sm mb-2">Are you sure you want to erase <strong>{{ name }}</strong> with login <strong>{{ login }}</strong>?</p>
  <p class="text-gray-700 text-sm mb-6">Doing so will erase all of their data for the study.</p>
  <div class="flex gap-3">
    <a href="/user_home/" class="border border-gray-400 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 text-sm">Cancel</a>
    <a href="/delete_user/{{delid}}" class="bg-danger text-white px-4 py-2 rounded-lg hover:bg-red-700 text-sm">Confirm</a>
  </div>
</div>
{% endblock %}
